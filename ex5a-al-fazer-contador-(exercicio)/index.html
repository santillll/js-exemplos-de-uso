<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de cliques</title>
    
    <style>
        body {
            background-color: rgb(255, 255, 255);
            color: black;
            flex-direction: column;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        button {
         padding: 10px 20px;
         font-size: 16px;
         cursor: pointer;
         align-items: center;
         justify-content: center;
        }

        #myText {
         padding: 10px 20px;
         margin-top: 10px;
         width: 100%; 
         text-align: center;
        }
     </style>
</head>
<body>
    <button id="myButton">Clique Aqui</button>
    <p id="myText">Número de cliques: 0</p>
    <script>
        let contador = 0;
   
         const button = document.querySelector('#myButton');
         const text = document.querySelector('#myText');
         
         button.addEventListener('click', () => {
                contador++;
                text.textContent = `Número de cliques: ${contador}`;
                
                if (contador % 2 === 0) {
                    document.body.style.backgroundColor = 'rgb(43, 255, 0)';
                    text.style.color = 'black';
                } else {
                    document.body.style.backgroundColor = 'rgb(255, 0, 0)';
                    text.style.color = 'white';
                }
         });

    </script>
    
    
</body>
</html>
